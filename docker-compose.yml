  # =================================================================
  # DATABASE BACKUP SERVICE
  # =================================================================
  backup:
    image: alpine:latest
    container_name: tailscale-backup
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./backups:/backups
    command: |
      sh -c "
        apk add --no-cache dcron
        echo '0 2 * * * tar -czf /backups/backup-$$(date +%Y%m%d).tar.gz /config /logs' | crontab -
        crond -f
      "
    networks:
      - tailscale-net
    restart: unless-stopped

